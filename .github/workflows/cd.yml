name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC — no long-lived AWS keys stored in secrets
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_DIR: infrastructure/terraform

jobs:
  test:
    name: Tests must pass before deploy
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to AWS
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Auth ─────────────────────────────────────────────────────────────
      # Uses OIDC — no AWS_SECRET_ACCESS_KEY needed.
      # Set up: IAM → Identity Providers → Add GitHub OIDC provider, then create
      # a role with condition  token.actions.githubusercontent.com:sub = repo:<owner>/<repo>:ref:refs/heads/main
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Terraform ─────────────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform plan
        run: terraform plan -out=tfplan -var="domain_name=${{ vars.DOMAIN_NAME }}"
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform apply
        run: terraform apply tfplan
        working-directory: ${{ env.TF_DIR }}

      # ── Deploy frontend assets to S3 ──────────────────────────────────────
      - name: Sync frontend to S3
        run: |
          BUCKET=$(terraform -chdir=$TF_DIR output -raw s3_frontend_bucket)
          aws s3 sync frontend/ s3://$BUCKET/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"
          # HTML: no cache — always fetch fresh
          aws s3 sync frontend/ s3://$BUCKET/ \
            --delete \
            --cache-control "no-cache" \
            --include "*.html" \
            --exclude "*"

      # ── Invalidate CloudFront cache ────────────────────────────────────────
      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(terraform -chdir=$TF_DIR output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
