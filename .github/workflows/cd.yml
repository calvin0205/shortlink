name: CD

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests before deploy
        working-directory: backend
        env:
          USERS_TABLE: otsentinel-test-users
          DEVICES_TABLE: otsentinel-test-devices
          INCIDENTS_TABLE: otsentinel-test-incidents
          AUDIT_TABLE: otsentinel-test-audit
          JWT_SECRET: test-secret-ci
          AWS_DEFAULT_REGION: us-east-1
        run: |
          pip install -r requirements-dev.txt
          pytest --tb=short -q

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: |
          terraform apply -auto-approve \
            -var="base_url_override=${{ vars.CLOUDFRONT_URL }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"

      - name: Get Terraform outputs
        id: tf_output
        working-directory: infrastructure/terraform
        run: |
          echo "s3_bucket=$(terraform output -raw s3_frontend_bucket)" >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ steps.tf_output.outputs.s3_bucket }}/static/ \
            --exclude "*.html" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_output.outputs.cf_id }} \
            --paths "/*"
