<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — OT Sentinel</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div style="font-size:3rem">🛡️</div>
        <h1>OT Sentinel</h1>
        <p class="text-secondary">Industrial Security Monitoring</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="admin@otsentinel.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        <div id="login-error" class="text-danger" style="display:none;margin-bottom:12px;font-size:0.875rem"></div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">Sign In</button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--text-secondary)">
        OT Sentinel v1.0 &mdash; Phase 1 Demo
      </p>
    </div>
  </div>
  <script src="/static/app.js"></script>
  <script src="/static/login.js"></script>
</body>
</html>
